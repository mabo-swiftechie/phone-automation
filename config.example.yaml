# ============================================
# AI電話自動化 — 設定ファイル（コピーして config.yaml にリネーム）
# ============================================
# 使い方:
#   Streamlit の「設定」タブから入力（推奨）
#   または直接編集: ~/.phone_automation/config.yaml

# OpenAI（必須 — メール生成・解析に使用）
openai_api_key: ""

# Gmail（メール確認を使う場合）
gmail_address: ""
gmail_app_password: ""

# Retell AI（電話確認を使う場合）
retell_api_key: ""
retell_agent_id: ""

# 会社情報（メール署名に使用）
company_name: ""
contact_person: ""
